name: session
risk: red
owns_tables:
  - sessions
  - session_devices
  - refresh_token_families
  - refresh_token_records
  - session_revocations
allowed_dependencies:
  - '@iam/contracts'
  - '@iam/platform-crypto'
  - '@iam/platform-events'
  - '@iam/module-identity'
  - '@iam/module-applications'
emits:
  - iam.session.revoked.v1
consumes:
  - iam.identity.account.changed.v1
